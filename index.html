<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👻 GHOST OSINT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header { text-align: center; padding: 30px 0 20px; border-bottom: 2px solid #ff4b4b; margin-bottom: 25px; }
        header h1 { color: #ff4b4b; font-size: 2.2rem; letter-spacing: 2px; }
        header .subtitle { color: #666; margin-top: 5px; font-size: 0.9rem; }
        
        /* Search */
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-box input { flex: 1; padding: 15px 20px; font-size: 1rem; background: #151520; border: 1px solid #2a2a3a; border-radius: 8px; color: #e0e0e0; outline: none; }
        .search-box input:focus { border-color: #ff4b4b; }
        .search-box button { padding: 15px 25px; font-size: 1rem; background: #ff4b4b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .search-box button:hover { background: #ff6b6b; }
        .search-box button:disabled { background: #333; cursor: not-allowed; }
        
        .url-hint { color: #666; font-size: 0.85rem; margin-bottom: 15px; }
        
        /* Options */
        .options { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .options label { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 15px; background: #151520; border-radius: 6px; border: 1px solid #2a2a3a; }
        .options label:hover { border-color: #ff4b4b; }
        
        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat { background: #151520; border: 1px solid #2a2a3a; border-radius: 10px; padding: 20px; text-align: center; }
        .stat .value { font-size: 1.8rem; font-weight: bold; color: #ff4b4b; }
        .stat .label { color: #666; font-size: 0.8rem; margin-top: 5px; text-transform: uppercase; }
        
        /* Anonymity Score */
        .anonymity-score { text-align: center; padding: 25px; border-radius: 12px; margin-bottom: 25px; }
        .anonymity-score h2 { font-size: 3rem; margin-bottom: 5px; }
        .anonymity-score p { font-size: 1.1rem; }
        .score-danger { background: linear-gradient(135deg, #ff4b4b22, #ff4b4b11); border: 2px solid #ff4b4b; }
        .score-danger h2 { color: #ff4b4b; }
        .score-warning { background: linear-gradient(135deg, #ffaa0022, #ffaa0011); border: 2px solid #ffaa00; }
        .score-warning h2 { color: #ffaa00; }
        .score-safe { background: linear-gradient(135deg, #00ff8822, #00ff8811); border: 2px solid #00ff88; }
        .score-safe h2 { color: #00ff88; }
        
        /* Sections */
        .section { background: #12121a; border: 1px solid #2a2a3a; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .section h2 { color: #ff4b4b; margin-bottom: 15px; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
        .section h3 { color: #ff8888; margin: 15px 0 10px; font-size: 1rem; }
        
        /* Info Grid */
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .info-item { background: #1a1a25; padding: 15px; border-radius: 8px; border-left: 3px solid #ff4b4b; }
        .info-item .label { color: #666; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .info-item .value { color: #fff; font-size: 1rem; margin-top: 5px; }
        
        /* Links */
        .profile-link { display: flex; align-items: center; gap: 10px; padding: 12px 15px; background: #1a1a25; border-radius: 8px; margin-bottom: 8px; text-decoration: none; color: #58a6ff; border: 1px solid #2a2a3a; transition: all 0.2s; }
        .profile-link:hover { border-color: #ff4b4b; background: #1a1a30; }
        .profile-link .platform { font-weight: bold; min-width: 100px; }
        .profile-link .url { color: #888; font-size: 0.85rem; word-break: break-all; }
        
        /* Quotes */
        .quote { background: #1a1a25; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 3px solid #58a6ff; }
        .quote .text { font-style: italic; line-height: 1.5; }
        .quote .source { color: #666; font-size: 0.8rem; margin-top: 8px; }
        
        /* Photo Gallery */
        .photo-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .photo-item { position: relative; border-radius: 8px; overflow: hidden; border: 2px solid #2a2a3a; cursor: pointer; transition: all 0.2s; }
        .photo-item:hover { border-color: #ff4b4b; transform: scale(1.02); }
        .photo-item img { width: 100%; height: 150px; object-fit: cover; }
        .photo-item .platform { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); padding: 5px; font-size: 0.7rem; text-align: center; }
        .photo-item .download { position: absolute; top: 5px; right: 5px; background: #ff4b4b; color: white; border: none; border-radius: 4px; padding: 3px 6px; font-size: 0.7rem; cursor: pointer; }
        
        /* Loading */
        .loading { text-align: center; padding: 60px; color: #666; }
        .loading .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #2a2a3a; border-top-color: #ff4b4b; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Error */
        .error { color: #ff4b4b; padding: 20px; background: #ff4b4b11; border-radius: 8px; border: 1px solid #ff4b4b; }
        
        /* History */
        .history { margin-top: 30px; }
        .history h3 { color: #666; margin-bottom: 10px; }
        .history-item { padding: 12px 15px; background: #151520; border: 1px solid #2a2a3a; border-radius: 8px; margin-bottom: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .history-item:hover { border-color: #ff4b4b; }
        
        /* Footer */
        .footer { text-align: center; padding: 30px; color: #444; font-size: 0.8rem; margin-top: 40px; border-top: 1px solid #1a1a25; }
        
        /* Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid #2a2a3a; padding-bottom: 10px; }
        .tab { padding: 10px 20px; background: #151520; border: 1px solid #2a2a3a; border-radius: 6px 6px 0 0; cursor: pointer; color: #888; }
        .tab.active { background: #ff4b4b; color: white; border-color: #ff4b4b; }
        .tab:hover:not(.active) { border-color: #ff4b4b; color: #ff4b4b; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Photo upload */
        .upload-zone { padding: 30px; border: 2px dashed #2a2a3a; border-radius: 10px; text-align: center; cursor: pointer; margin-bottom: 15px; transition: all 0.2s; }
        .upload-zone:hover { border-color: #ff4b4b; background: #151520; }
        .upload-zone input { display: none; }
        
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👻 GHOST</h1>
            <p class="subtitle">OSINT Engine — No One Is Invisible</p>
        </header>
        
        <div class="search-box">
            <input type="text" id="target" placeholder="Username, email, or profile URL..." onkeypress="if(event.key==='Enter')startScan()">
            <button id="scanBtn" onclick="startScan()">🔍 Investigate</button>
            <button onclick="purgeHistory()" style="background:#333; padding:15px 15px;" title="Clear history">🗑️</button>
        </div>
        <p class="url-hint">💡 Paste a Twitter/Instagram/GitHub profile URL or type a username</p>
        
        <div class="options">
            <label><input type="checkbox" id="deepScan" checked> Deep scan (Maigret 3000+ sites)</label>
            <label><input type="checkbox" id="extractPhotos" checked> Extract photos</label>
            <label><input type="checkbox" id="writtenReport" checked> Written report</label>
        </div>
        
        <div id="loading" class="loading" style="display:none">
            <div class="spinner"></div>
            <p>Investigation in progress... This may take 1-3 minutes.</p>
            <p id="loadingStatus" style="color:#666; font-size:0.85rem; margin-top:10px;"></p>
        </div>
        
        <div id="results"></div>
        
        <div class="history" id="historySection" style="display:none">
            <h3>📁 Investigation History</h3>
            <div id="historyList"></div>
        </div>
        
        <div class="footer">
            <p>GHOST OSINT Engine v0.3 — For educational and lawful use only</p>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://ghost-g499.onrender.com';
        let history = JSON.parse(localStorage.getItem('ghost_history') || '[]');
        
        function showHistory() {
            const el = document.getElementById('historySection');
            const list = document.getElementById('historyList');
            if (history.length === 0) { el.style.display = 'none'; return; }
            el.style.display = 'block';
            list.innerHTML = history.slice(-10).reverse().map(h => `
                <div class="history-item" onclick="loadReport('${h.target}')">
                    <span>🔍 ${h.target}</span>
                    <span style="color:#666">${h.date}</span>
                </div>
            `).join('');
        }
        
        function isUrl(str) {
            return str.match(/^https?:\/\//i) || str.match(/^(?:www\.)?[\w-]+\.\w{2,}/i);
        }
        
        async function startScan() {
            const input = document.getElementById('target').value.trim();
            if (!input) return;
            
            const deep = document.getElementById('deepScan').checked;
            const photos = document.getElementById('extractPhotos').checked;
            const report = document.getElementById('writtenReport').checked;
            const btn = document.getElementById('scanBtn');
            
            btn.disabled = true;
            btn.textContent = '⏳ Investigating...';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').innerHTML = '';
            document.getElementById('loadingStatus').textContent = 'Phase 1: Scanning platforms...';
            
            try {
                const body = { deep, photos, report };
                if (isUrl(input)) { body.url = input; } else { body.target = input; }
                
                const res = await fetch(`${API_URL}/dossier`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                
                if (data.job_id) {
                    pollDossier(data.job_id);
                } else {
                    showError(data.error || 'Unknown error');
                }
            } catch (e) {
                showError('Connection error: ' + e.message);
            }
        }
        
        async function pollDossier(jobId) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_URL}/scan/${jobId}`);
                    const data = await res.json();
                    
                    if (data.status === 'running') {
                        document.getElementById('loadingStatus').textContent = 
                            data.status_message || 'Processing...';
                    } else if (data.status === 'completed') {
                        clearInterval(interval);
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('scanBtn').disabled = false;
                        document.getElementById('scanBtn').textContent = '🔍 Investigate';
                        
                        // Add to history
                        const entry = { target: data.target, date: new Date().toLocaleString() };
                        history = history.filter(h => h.target !== data.target);
                        history.push(entry);
                        localStorage.setItem('ghost_history', JSON.stringify(history));
                        showHistory();
                        
                        // Load HTML dossier
                        loadDossierHtml(jobId);
                    } else {
                        clearInterval(interval);
                        showError(data.error || 'Scan failed');
                    }
                } catch (e) {
                    clearInterval(interval);
                    showError('Connection lost: ' + e.message);
                }
            }, 3000);
        }
        
        async function loadDossierHtml(jobId) {
            try {
                const res = await fetch(`${API_URL}/dossier/${jobId}`);
                if (res.headers.get('content-type')?.includes('text/html')) {
                    const html = await res.text();
                    document.getElementById('results').innerHTML = html;
                } else {
                    const data = await res.json();
                    showError(data.error || 'Could not load dossier');
                }
            } catch (e) {
                showError('Could not load dossier: ' + e.message);
            }
        }
        
        async function loadReport(target) {
            document.getElementById('target').value = target;
            startScan();
        }
        
        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('scanBtn').disabled = false;
            document.getElementById('scanBtn').textContent = '🔍 Investigate';
            document.getElementById('results').innerHTML = `<div class="error">❌ ${msg}</div>`;
        }
        
        function downloadPhoto(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.target = '_blank';
            a.click();
        }
        
        async function purgeHistory() {
            if (!confirm('Clear all investigation history?')) return;
            try {
                const res = await fetch(`${API_URL}/purge`, { method: 'GET' });
                const data = await res.json();
                if (data.success) {
                    history = [];
                    localStorage.removeItem('ghost_history');
                    showHistory();
                    alert(`Cleared! Removed ${data.removed_jobs} jobs and ${data.removed_files} files.`);
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }
        
        // Init
        showHistory();
    </script>
</body>
</html>
