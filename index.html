<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST OSINT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #21262d; margin-bottom: 30px; }
        h1 { color: #ff4b4b; font-size: 2.5rem; }
        .subtitle { color: #8b949e; margin-top: 5px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input[type="text"] { flex: 1; padding: 15px 20px; font-size: 1rem; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: #c9d1d9; outline: none; }
        input[type="text"]:focus { border-color: #ff4b4b; }
        button { padding: 15px 30px; font-size: 1rem; background: #ff4b4b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ff6b6b; }
        button:disabled { background: #30363d; cursor: not-allowed; }
        .options { display: flex; gap: 20px; margin-bottom: 20px; }
        .options label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .results { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; min-height: 200px; }
        .results h2 { color: #ff4b4b; margin-bottom: 15px; }
        .results pre { white-space: pre-wrap; word-wrap: break-word; font-size: 0.9rem; line-height: 1.5; }
        .loading { text-align: center; padding: 40px; color: #8b949e; }
        .error { color: #ff4b4b; }
        .success { color: #3fb950; }
        .history { margin-top: 30px; }
        .history h3 { color: #8b949e; margin-bottom: 10px; }
        .history-item { padding: 10px 15px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 5px; cursor: pointer; display: flex; justify-content: space-between; }
        .history-item:hover { border-color: #ff4b4b; }
        .history-item .target { font-weight: bold; }
        .history-item .date { color: #8b949e; font-size: 0.85rem; }
        .face-search { margin: 20px 0; padding: 20px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
        .face-search h3 { color: #ff4b4b; margin-bottom: 5px; }
        .drop-zone { padding: 20px; border: 2px dashed #30363d; border-radius: 8px; text-align: center; cursor: pointer; margin: 10px 0; transition: all 0.2s; }
        .drop-zone:hover { border-color: #ff4b4b; background: #1c2128; }
        .drop-zone.has-image { border-color: #3fb950; padding: 10px; }
        .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid #30363d; }
        .remove-btn { position: relative; top: -30px; left: -10px; background: #ff4b4b; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 0.7rem; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; text-align: center; }
        .stat .value { font-size: 1.5rem; font-weight: bold; color: #ff4b4b; }
        .stat .label { color: #8b949e; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👻 GHOST</h1>
            <p class="subtitle">OSINT Engine — No One Is Invisible</p>
        </header>

        <div class="search-box">
            <input type="text" id="target" placeholder="Enter username or email..." onkeypress="if(event.key==='Enter')scan()">
            <button id="scanBtn" onclick="scan()">🔍 Scan</button>
        </div>

        <div class="options">
            <label><input type="checkbox" id="deep"> Deep mode</label>
            <label><input type="checkbox" id="enrich" checked> AI Enrichment</label>
        </div>

        <div class="face-search">
            <h3>🖼️ Face Search (optional)</h3>
            <p style="color:#8b949e;font-size:0.85rem;margin-bottom:10px;">Upload 1-2 photos for facial recognition search</p>
            <div class="upload-area" id="uploadArea">
                <input type="file" id="photo1" accept="image/*" style="display:none" onchange="handleFile(this, 1)">
                <input type="file" id="photo2" accept="image/*" style="display:none" onchange="handleFile(this, 2)">
                <div class="drop-zone" onclick="document.getElementById('photo1').click()">
                    📷 Click to upload photo 1
                </div>
                <div class="drop-zone" onclick="document.getElementById('photo2').click()">
                    📷 Click to upload photo 2 (optional)
                </div>
            </div>
            <div id="previewArea" style="display:flex;gap:10px;margin-top:10px;"></div>
        </div>

        <div class="stats" id="stats" style="display:none">
            <div class="stat"><div class="value" id="statFound">0</div><div class="label">Found</div></div>
            <div class="stat"><div class="value" id="statTotal">0</div><div class="label">Checked</div></div>
            <div class="stat"><div class="value" id="statTime">0s</div><div class="label">Time</div></div>
        </div>

        <div class="results" id="results">
            <p style="color: #8b949e; text-align: center; padding: 40px;">
                Enter a username or email above to start scanning.
            </p>
        </div>

        <div class="history" id="history" style="display:none">
            <h3>📁 History</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://ghost-g499.onrender.com';
        let history = JSON.parse(localStorage.getItem('ghost_history') || '[]');
        let currentJobId = null;
        let pollInterval = null;
        let uploadedPhotos = [null, null];

        function handleFile(input, index) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedPhotos[index - 1] = e.target.result;
                updatePreview();
            };
            reader.readAsDataURL(file);
        }

        function updatePreview() {
            const area = document.getElementById('previewArea');
            area.innerHTML = '';
            uploadedPhotos.forEach((photo, i) => {
                if (photo) {
                    const div = document.createElement('div');
                    div.style.position = 'relative';
                    div.innerHTML = `
                        <img src="${photo}" class="preview-img">
                        <button class="remove-btn" onclick="removePhoto(${i})">×</button>
                    `;
                    area.appendChild(div);
                }
            });
        }

        function removePhoto(index) {
            uploadedPhotos[index] = null;
            document.getElementById(`photo${index + 1}`).value = '';
            updatePreview();
        }

        function showHistory() {
            const el = document.getElementById('history');
            const list = document.getElementById('historyList');
            if (history.length === 0) { el.style.display = 'none'; return; }
            el.style.display = 'block';
            list.innerHTML = history.slice(-10).reverse().map(h => `
                <div class="history-item" onclick="loadReport('${h.target}')">
                    <span class="target">${h.target}</span>
                    <span class="date">${h.date}</span>
                </div>
            `).join('');
        }

        async function scan() {
            const target = document.getElementById('target').value.trim();
            if (!target) return;

            const deep = document.getElementById('deep').checked;
            const enrich = document.getElementById('enrich').checked;
            const btn = document.getElementById('scanBtn');

            btn.disabled = true;
            btn.textContent = '⏳ Scanning...';
            document.getElementById('results').innerHTML = '<div class="loading">Scanning in progress...<br>This may take 1-2 minutes.</div>';

            try {
                const body = { target, deep, enrich };
                
                // Add photos if uploaded
                const photos = uploadedPhotos.filter(p => p !== null);
                if (photos.length > 0) {
                    body.photos = photos;
                }

                const res = await fetch(`${API_URL}/scan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (data.job_id) {
                    currentJobId = data.job_id;
                    pollInterval = setInterval(() => checkStatus(data.job_id), 5000);
                } else {
                    document.getElementById('results').innerHTML = `<p class="error">Error: ${data.error || 'Unknown'}</p>`;
                    btn.disabled = false;
                    btn.textContent = '🔍 Scan';
                }
            } catch (e) {
                document.getElementById('results').innerHTML = `<p class="error">Connection error: ${e.message}</p>`;
                btn.disabled = false;
                btn.textContent = '🔍 Scan';
            }
        }

        async function checkStatus(jobId) {
            try {
                const res = await fetch(`${API_URL}/scan/${jobId}`);
                const data = await res.json();

                if (data.status === 'completed') {
                    clearInterval(pollInterval);
                    document.getElementById('scanBtn').disabled = false;
                    document.getElementById('scanBtn').textContent = '🔍 Scan';

                    // Add to history
                    const entry = { target: data.target, date: new Date().toLocaleString(), report: data.report_path };
                    history = history.filter(h => h.target !== data.target);
                    history.push(entry);
                    localStorage.setItem('ghost_history', JSON.stringify(history));
                    showHistory();

                    // Load report
                    if (data.report_path) {
                        loadReport(data.target);
                    }
                } else if (data.status === 'failed' || data.status === 'error' || data.status === 'timeout') {
                    clearInterval(pollInterval);
                    document.getElementById('scanBtn').disabled = false;
                    document.getElementById('scanBtn').textContent = '🔍 Scan';
                    document.getElementById('results').innerHTML = `<p class="error">Scan ${data.status}: ${data.error || ''}</p>`;
                }
            } catch (e) {
                clearInterval(pollInterval);
                document.getElementById('scanBtn').disabled = false;
                document.getElementById('scanBtn').textContent = '🔍 Scan';
            }
        }

        async function loadReport(target) {
            try {
                // Find latest report for this target
                const res = await fetch(`${API_URL}/reports`);
                const data = await res.json();
                const reports = data.reports || [];
                const report = reports.find(r => r.filename.includes(target));

                if (report) {
                    const res2 = await fetch(`${API_URL}/report/${report.filename}`);
                    const data2 = await res2.json();
                    document.getElementById('results').innerHTML = `<pre>${data2.content}</pre>`;

                    // Extract stats
                    const found = data2.content.match(/Found[\s:]+(\d+)\/(\d+)/);
                    if (found) {
                        document.getElementById('stats').style.display = 'grid';
                        document.getElementById('statFound').textContent = found[1];
                        document.getElementById('statTotal').textContent = found[2];
                    }
                } else {
                    document.getElementById('results').innerHTML = `<p>No report found for ${target}</p>`;
                }
            } catch (e) {
                document.getElementById('results').innerHTML = `<p class="error">Error loading report: ${e.message}</p>`;
            }
        }

        // Init
        showHistory();
    </script>
</body>
</html>
